spring.application.name=heavenhub
server.address=0.0.0.0
server.port=${PORT:8080}

# -----------------
# POSTGRESQL CONFIG
# -----------------
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/heavenhub}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:Ansh@123}
spring.datasource.driver-class-name=org.postgresql.Driver

# -----------------
# JPA / HIBERNATE
# -----------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# -----------------
# RAZORPAY CONFIG
# -----------------
payment.razorpay.keyId=${RAZORPAY_KEY_ID:rzp_test_placeholder_key}
payment.razorpay.keySecret=${RAZORPAY_KEY_SECRET:rzp_test_placeholder_secret}

# -----------------
# PRODUCTION LOGGING
# -----------------
logging.level.root=INFO
logging.level.com.heavenhub=DEBUG
