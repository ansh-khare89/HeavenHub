spring.application.name=heavenhub

# -----------------
# POSTGRESQL CONFIG
# -----------------
# The JDBC URL to connect to the local postgres database named "heavenhub"
spring.datasource.url=jdbc:postgresql://localhost:5432/heavenhub
# Default postgres username is usually "postgres"
spring.datasource.username=postgres
# Replace with your actual postgres password if different
# IMPORTANT: If your app crashes saying "password authentication failed", change this line!
spring.datasource.password=Ansh@123
spring.datasource.driver-class-name=org.postgresql.Driver

# -----------------
# JPA / HIBERNATE
# -----------------
# "update" tells Hibernate to automatically create/update database tables based on our Entities
spring.jpa.hibernate.ddl-auto=update
# Show SQL in the console so we can learn what queries Hibernate is running
spring.jpa.show-sql=true
# Make the SQL in the console readable instead of one long line
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Run schema.sql AFTER Hibernate so we can fix legacy/missing columns (e.g. average_rating).
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
