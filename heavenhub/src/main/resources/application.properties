spring.application.name=heavenhub

server.address=0.0.0.0
server.port=${PORT:8080}

# =========================
# DATABASE (Render Postgres)
# =========================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# DO NOT force dialect (let Hibernate auto-detect)
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# =========================
# CONNECTION POOL / PERFORMANCE
# =========================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true



# =========================
# RAZORPAY (SAFE CONFIG)
# =========================
payment.razorpay.keyId=${RAZORPAY_KEY_ID:dummy}
payment.razorpay.keySecret=${RAZORPAY_KEY_SECRET:dummy}

# =========================
# LOGGING
# =========================
logging.level.root=INFO
logging.level.com.heavenhub=DEBUG